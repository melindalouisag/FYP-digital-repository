# Nginx reverse proxy for the thesis repository stack.
# - Serves the built admin UI (Vite) from /var/www/thesis-admin
# - Forwards API requests to the Spring Boot service on localhost:8080

# macOS Homebrew installs nginx under the current user, so keep the default or set to nobody.
user  nobody;
worker_processes  auto;

events {
    worker_connections  1024;
}

http {
    include       mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    types_hash_max_size 2048;

    # Enable gzip for static assets generated by Vite.
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/xml text/javascript image/svg+xml;
    gzip_min_length 1024;

    server {
        listen 8081 default_server;
        listen [::]:8081 default_server;
        server_name _;

        # Upload limit (aligned with Spring multipart + file.max-size-bytes).
        client_max_body_size 5M;

        # Serve the built admin UI (copy admin-ui/dist here after running `npm run build`).
        root /var/www/thesis-admin;
        index index.html;

        # Cache immutable assets generated by Vite for faster repeat loads.
        location ~* \.(?:css|js|woff2?|ttf|eot|ico|svg)$ {
            try_files $uri =404;
            expires 7d;
            add_header Cache-Control "public, max-age=604800, immutable";
        }

        # React/Vite single-page app fallback.
        location / {
            try_files $uri $uri/ /index.html;
        }

        # Reverse proxy to the Spring Boot backend.
        location /api/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Forward actuator endpoints for health checks if needed.
        location /actuator/ {
            proxy_pass http://127.0.0.1:8080;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }
}
