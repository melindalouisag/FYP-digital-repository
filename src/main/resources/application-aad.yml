spring:
  security:
    oauth2:
      client:
        registration:
          azure:
            client-id: ${AZURE_CLIENT_ID:${AAD_CLIENT_ID:}}
            client-secret: ${AZURE_CLIENT_SECRET:${AAD_CLIENT_SECRET:}}
            redirect-uri: ${AZURE_REDIRECT_URI:${AAD_REDIRECT_URI:{baseUrl}/login/oauth2/code/{registrationId}}}
            scope:
              - openid
              - profile
              - email

        provider:
          azure:
            issuer-uri: https://login.microsoftonline.com/${AZURE_TENANT_ID:${AAD_TENANT_ID:}}/v2.0

app:
  auth:
    mode: ${APP_AUTH_MODE:SSO}
